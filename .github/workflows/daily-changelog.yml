name: Daily Claude Docs Changelog

on:
  schedule:
    - cron: '0 5 * * *'    # 05:00 UTC = 08:00 IDT (summer) / 07:00 IST (winter)
  workflow_dispatch:         # Manual trigger for testing
    inputs:
      lookback:
        description: 'How far back to check for changes (e.g. "24 hours ago", "72 hours ago")'
        required: false
        default: '24 hours ago'

permissions:
  contents: write            # Needed to commit HTML changelogs
  id-token: write            # Needed by claude-code-action for OIDC auth

concurrency:
  group: changelog
  cancel-in-progress: false

env:
  DOCS_REPO: costiash/claude-code-docs
  LOOKBACK: ${{ github.event.inputs.lookback || '24 hours ago' }}

jobs:
  changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # 1. Checkout our repo (scripts, prompts, archive)
      - name: Checkout changelog repo
        uses: actions/checkout@v4

      # 2. Clone the docs mirror
      - name: Clone claude-code-docs
        run: git clone --depth=100 https://github.com/${{ env.DOCS_REPO }}.git docs-mirror

      # 3. Build pre-computed scaffold and prompt
      - name: Build changelog context
        id: detect
        run: python3 scripts/build-context.py docs-mirror "${{ env.LOOKBACK }}"

      # 4. Early exit if no changes
      - name: Skip if no updates
        if: steps.detect.outputs.has_changes == 'false'
        run: echo "::notice::No doc changes in last ${{ env.LOOKBACK }}. Skipping."

      # 5. Run claude-code-action — Claude reads the pre-built prompt file
      - name: Summarize with Claude
        if: steps.detect.outputs.has_changes == 'true'
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: Read the file /tmp/changelog-prompt.md and follow the instructions inside it exactly. Output ONLY the completed JSON.
          claude_args: >-
            --model haiku
            --max-turns 3
            --allowedTools Read
            --json-schema '{"type":"object","required":["date","has_updates","highlights","sections"],"additionalProperties":false,"properties":{"date":{"type":"string"},"has_updates":{"type":"boolean"},"highlights":{"type":"array","items":{"type":"string"},"maxItems":6},"sections":{"type":"array","items":{"type":"object","required":["category","icon","docs_updated","docs_new","entries"],"additionalProperties":false,"properties":{"category":{"type":"string","enum":["Claude Code CLI","Agent SDK","API Reference","Platform","Resources","About Claude","Agents & Tools","Testing & Evaluation","Release Notes","Prompt Library","Getting Started","Other"]},"icon":{"type":"string"},"docs_updated":{"type":"integer"},"docs_new":{"type":"integer"},"entries":{"type":"array","items":{"type":"object","required":["title","is_new","summary","changes","source_url"],"additionalProperties":false,"properties":{"title":{"type":"string"},"is_new":{"type":"boolean"},"summary":{"type":"string"},"changes":{"type":"array","items":{"type":"string"}},"source_url":{"type":"string"}}}}}}}}}'

      # 5b. Save structured output to file, strip _context as safety net
      - name: Save Claude output
        if: steps.detect.outputs.has_changes == 'true'
        env:
          STRUCTURED_OUTPUT: ${{ steps.claude.outputs.structured_output }}
        run: |
          python3 -c "
          import os, json
          data = json.loads(os.environ['STRUCTURED_OUTPUT'])
          for section in data.get('sections', []):
            for entry in section.get('entries', []):
              entry.pop('_context', None)
          json.dump(data, open('/tmp/claude-changelog.json', 'w'))
          print(f'Claude output: valid JSON, {len(data.get(\"sections\", []))} sections')
          "

      # 6. Format and post to Slack (non-blocking — failure won't stop HTML archive)
      - name: Post to Slack
        if: steps.detect.outputs.has_changes == 'true'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          cat /tmp/claude-changelog.json | python3 scripts/format-slack-message.py > /tmp/slack-payload.json
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' -d @/tmp/slack-payload.json \
            || echo "::warning::Slack webhook failed — continuing with HTML archive"

      # 7. Generate and commit HTML changelog
      - name: Archive HTML changelog
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          cat /tmp/claude-changelog.json | python3 scripts/format-html-changelog.py \
            > "changelogs/$TODAY.html"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git add "changelogs/$TODAY.html"
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "changelog: $TODAY"
            git push
          fi

      # 8. Cleanup
      - name: Cleanup
        if: always()
        run: rm -rf docs-mirror
