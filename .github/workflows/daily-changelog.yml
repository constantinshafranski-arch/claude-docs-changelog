name: Daily Claude Docs Changelog

on:
  schedule:
    - cron: '0 5 * * *'    # 05:00 UTC = 08:00 IDT (summer) / 07:00 IST (winter)
  workflow_dispatch:         # Manual trigger for testing
    inputs:
      lookback:
        description: 'How far back to check for changes (e.g. "24 hours ago", "72 hours ago")'
        required: false
        default: '24 hours ago'

permissions:
  contents: write            # Needed to commit HTML changelogs
  id-token: write            # Needed by claude-code-action for OIDC auth

concurrency:
  group: changelog
  cancel-in-progress: false

env:
  DOCS_REPO: costiash/claude-code-docs
  LOOKBACK: ${{ github.event.inputs.lookback || '24 hours ago' }}

jobs:
  changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout our repo (scripts, prompts, archive)
      - name: Checkout changelog repo
        uses: actions/checkout@v4

      # 2. Clone the docs mirror
      - name: Clone claude-code-docs
        run: git clone --shallow-since="${{ env.LOOKBACK }}" https://github.com/${{ env.DOCS_REPO }}.git docs-mirror || git clone --depth=100 https://github.com/${{ env.DOCS_REPO }}.git docs-mirror

      # 3. Detect changes in last 24h
      - name: Detect doc changes
        id: detect
        run: |
          chmod +x scripts/detect-changes.sh
          scripts/detect-changes.sh docs-mirror "${{ env.LOOKBACK }}"

      # 4. Early exit if no changes
      - name: Skip if no updates
        if: steps.detect.outputs.has_changes == 'false'
        run: echo "::notice::No doc changes in last ${{ env.LOOKBACK }}. Skipping."

      # 5. Run claude-code-action for summarization
      - name: Summarize with Claude
        if: steps.detect.outputs.has_changes == 'true'
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read the file CONTEXT.md in the repo root. It contains a list of changed
            documentation files with their categories and diff excerpts.

            Read each changed file from the docs-mirror/docs/ directory to understand
            the full content (not just the diffs).

            Then produce a JSON changelog following the schema in prompts/changelog-schema.json.
            Output ONLY the JSON object, no markdown fences, no explanation.
          claude_args: "--model sonnet --max-turns 30 --allowedTools Read,Glob,Grep"

      # 5b. Extract Claude's text output from the execution log
      - name: Extract Claude output
        if: steps.detect.outputs.has_changes == 'true'
        id: extract
        run: |
          EXEC_FILE="${{ steps.claude.outputs.execution_file }}"
          if [ -z "$EXEC_FILE" ] || [ ! -f "$EXEC_FILE" ]; then
            echo "::error::No execution file found"
            exit 1
          fi
          # Extract the last assistant text message from the execution log
          CLAUDE_RESULT=$(python3 -c "
          import json, sys
          with open('$EXEC_FILE') as f:
              data = json.load(f)
          # Walk through messages to find the last assistant text content
          result = ''
          for msg in data.get('messages', data if isinstance(data, list) else []):
              if isinstance(msg, dict):
                  role = msg.get('role', '')
                  if role == 'assistant':
                      for block in msg.get('content', []):
                          if isinstance(block, dict) and block.get('type') == 'text':
                              result = block['text']
                          elif isinstance(block, str):
                              result = block
          # Strip markdown fences if present
          if result.startswith('\`\`\`'):
              lines = result.split('\n')
              lines = [l for l in lines if not l.startswith('\`\`\`')]
              result = '\n'.join(lines)
          print(result)
          ")
          # Save to file for downstream steps (avoids shell quoting issues)
          echo "$CLAUDE_RESULT" > /tmp/claude-changelog.json
          echo "has_output=true" >> "$GITHUB_OUTPUT"

      # 6. Format and post to Slack (non-blocking — failure won't stop HTML archive)
      - name: Post to Slack
        if: steps.detect.outputs.has_changes == 'true' && steps.extract.outputs.has_output == 'true'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          cat /tmp/claude-changelog.json | python3 scripts/format-slack-message.py > /tmp/slack-payload.json
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' -d @/tmp/slack-payload.json \
            || echo "::warning::Slack webhook failed — continuing with HTML archive"

      # 7. Generate and commit HTML changelog
      - name: Archive HTML changelog
        if: steps.detect.outputs.has_changes == 'true' && steps.extract.outputs.has_output == 'true'
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          cat /tmp/claude-changelog.json | python3 scripts/format-html-changelog.py \
            > "changelogs/$TODAY.html"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "changelogs/$TODAY.html"
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "changelog: $TODAY"
            git push
          fi

      # 8. Cleanup
      - name: Cleanup
        if: always()
        run: rm -rf docs-mirror CONTEXT.md
