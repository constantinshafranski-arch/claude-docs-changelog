name: Daily Claude Docs Changelog

on:
  schedule:
    - cron: '0 5 * * *'    # 05:00 UTC = 08:00 IDT (summer) / 07:00 IST (winter)
  workflow_dispatch:         # Manual trigger for testing
    inputs:
      lookback:
        description: 'How far back to check for changes (e.g. "24 hours ago", "72 hours ago")'
        required: false
        default: '24 hours ago'

permissions:
  contents: write            # Needed to commit HTML changelogs

concurrency:
  group: changelog
  cancel-in-progress: false

env:
  DOCS_REPO: costiash/claude-code-docs
  LOOKBACK: ${{ github.event.inputs.lookback || '24 hours ago' }}

jobs:
  changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      # 1. Checkout our repo (scripts, prompts, archive)
      - name: Checkout changelog repo
        uses: actions/checkout@v4

      # 2. Clone the docs mirror
      - name: Clone claude-code-docs
        run: git clone --depth=100 https://github.com/${{ env.DOCS_REPO }}.git docs-mirror

      # 3. Build pre-computed scaffold and prompt
      - name: Build changelog context
        id: detect
        run: python3 scripts/build-context.py docs-mirror "${{ env.LOOKBACK }}"

      # 4. Early exit if no changes
      - name: Skip if no updates
        if: steps.detect.outputs.has_changes == 'false'
        run: echo "::notice::No doc changes in last ${{ env.LOOKBACK }}. Skipping."

      # 5. Call Anthropic API directly with forced tool_use for structured output.
      #    Splits into multiple calls if prompt exceeds Sonnet 4.6's context budget.
      - name: Summarize with Claude
        if: steps.detect.outputs.has_changes == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install --quiet anthropic
          python3 scripts/call-claude-api.py

      # 6. Format and post to Slack (non-blocking — failure won't stop HTML archive)
      - name: Post to Slack
        if: steps.detect.outputs.has_changes == 'true'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          cat /tmp/claude-changelog.json | python3 scripts/format-slack-message.py > /tmp/slack-payload.json
          echo "Slack payload: $(wc -c < /tmp/slack-payload.json) bytes, $(python3 -c "import json; d=json.load(open('/tmp/slack-payload.json')); print(len(d.get('blocks',[])), 'blocks')")"
          HTTP_CODE=$(curl -s -o /tmp/slack-response.txt -w '%{http_code}' -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' -d @/tmp/slack-payload.json)
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Slack post succeeded (HTTP $HTTP_CODE)"
          else
            echo "::warning::Slack webhook returned HTTP $HTTP_CODE: $(cat /tmp/slack-response.txt)"
          fi

      # 7. Generate and commit HTML changelog
      - name: Archive HTML changelog
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          cat /tmp/claude-changelog.json | python3 scripts/format-html-changelog.py \
            > "changelogs/$TODAY.html"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git add "changelogs/$TODAY.html"
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "changelog: $TODAY"
            git push
          fi

      # 8. Cleanup
      - name: Cleanup
        if: always()
        run: rm -rf docs-mirror
