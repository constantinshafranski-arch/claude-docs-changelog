<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Docs Changelog &mdash; March 31, 2026</title>
  <style>
:root {
  --bg: #0D0D16;
  --surface: #161624;
  --surface-hover: #1C1A28;
  --border: #2A2840;
  --text: #E8E0D4;
  --text-muted: #9A9088;
  --accent: #F0A050;
  --accent-dim: rgba(240, 160, 80, 0.08);
  --blue: #60A0E0;
  --blue-dim: rgba(96, 160, 224, 0.08);
  --green: #50C8A0;
  --green-dim: rgba(80, 200, 160, 0.08);
  --purple: #C080E0;
  --purple-dim: rgba(192, 128, 224, 0.08);
  --red: #F06060;
  --red-dim: rgba(240, 96, 96, 0.06);
  --radius: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  padding: 2rem 1rem 4rem;
}

h1, h2 { font-family: Georgia, 'Times New Roman', 'Noto Serif', serif; }
.source-link, .tag, .count { font-family: 'SF Mono', 'Cascadia Mono', Consolas, 'Liberation Mono', monospace; }

.container { max-width: 960px; margin: 0 auto; }

header {
  text-align: center;
  padding: 2.5rem 0 2rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2.5rem;
}
header h1 {
  font-size: 1.85rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 0.35rem;
}
header .date {
  color: var(--text-muted);
  font-size: 0.92rem;
}
header .badge {
  display: inline-block;
  margin-top: 0.75rem;
  padding: 0.25rem 0.75rem;
  border-radius: 999px;
  font-size: 0.78rem;
  font-weight: 600;
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid rgba(80, 200, 160, 0.25);
}

.section-heading {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin: 2.5rem 0 1.25rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
}
.section-heading .icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}
.section-heading h2 {
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.section-heading .count {
  margin-left: auto;
  font-size: 0.78rem;
  color: var(--text-muted);
  background: var(--surface);
  padding: 0.2rem 0.6rem;
  border-radius: 999px;
  border: 1px solid var(--border);
}
.icon-cli  { background: var(--blue-dim);   color: var(--blue); }
.icon-sdk  { background: var(--purple-dim); color: var(--purple); }
.icon-api  { background: var(--accent-dim); color: var(--accent); }
.icon-plat { background: var(--accent-dim); color: var(--accent); }
.icon-res  { background: var(--green-dim);  color: var(--green); }
.icon-other { background: var(--blue-dim);  color: var(--blue); }
.icon-about  { background: var(--blue-dim);   color: var(--blue); }
.icon-tools  { background: var(--accent-dim); color: var(--accent); }
.icon-test   { background: var(--green-dim);  color: var(--green); }
.icon-release { background: var(--purple-dim); color: var(--purple); }
.icon-prompts { background: var(--accent-dim); color: var(--accent); }
.icon-start  { background: var(--green-dim);  color: var(--green); }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.35rem 1.5rem;
  margin-bottom: 1rem;
  transition: border-color 0.15s, box-shadow 0.15s;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
}
.card:hover { border-color: rgba(240, 160, 80, 0.3); box-shadow: 0 0 20px rgba(240, 160, 80, 0.08); }

.card-header {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 0.75rem;
}
.card-header h3 {
  font-size: 1.05rem;
  font-weight: 650;
}
.tag {
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
}
.tag-updated { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(96,160,224,0.2); }
.tag-new     { background: var(--green-dim); color: var(--green); border: 1px solid rgba(80,200,160,0.25); }

.card p {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-bottom: 0.75rem;
}

.card ul { list-style: none; padding: 0; }
.card ul li {
  position: relative;
  padding-left: 1.25rem;
  margin-bottom: 0.4rem;
  font-size: 0.88rem;
  color: var(--text);
}
.card ul li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0.55em;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border);
}
.card ul li strong {
  color: var(--text);
  font-weight: 600;
}

.source-link {
  display: inline-block;
  margin-top: 0.65rem;
  font-size: 0.8rem;
  color: var(--blue);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color 0.15s;
}
.source-link:hover { border-bottom-color: var(--blue); }

.highlights {
  background: var(--surface);
  border: 1px solid var(--accent);
  border-left: 4px solid var(--accent);
  border-radius: var(--radius);
  padding: 1.25rem 1.5rem;
  margin-bottom: 2rem;
}
.highlights h3 {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 0.6rem;
}
.highlights ul li::before { background: var(--accent); }

.stats {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  margin-bottom: 2rem;
}
.stat {
  flex: 1;
  min-width: 140px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  text-align: center;
}
.stat .num { font-size: 1.6rem; font-weight: 700; }
.stat .label { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.15rem; }
.stat.cli  .num { color: var(--blue); }
.stat.sdk  .num { color: var(--purple); }
.stat.api  .num { color: var(--accent); }
.stat.plat .num { color: var(--accent); }
.stat.res  .num { color: var(--green); }
.stat.other .num { color: var(--blue); }
.stat.about  .num { color: var(--blue); }
.stat.tools  .num { color: var(--accent); }
.stat.test   .num { color: var(--green); }
.stat.release .num { color: var(--purple); }
.stat.prompts .num { color: var(--accent); }
.stat.start  .num { color: var(--green); }

.course-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-top: 0.65rem;
}
.course-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.course-btn:hover {
  background: var(--accent);
  color: var(--bg);
  box-shadow: 0 0 20px rgba(240, 160, 80, 0.25);
}
.course-btn-icon { font-size: 0.65rem; }
.course-note {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-style: italic;
}
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface);
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 0.75rem 1.5rem;
  border-radius: var(--radius);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 0.88rem;
  font-weight: 500;
  box-shadow: 0 8px 32px rgba(0,0,8,0.5), 0 0 20px rgba(240,160,80,0.15);
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 10000;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

footer {
  text-align: center;
  color: var(--text-muted);
  font-size: 0.78rem;
  margin-top: 3rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
}

@media (max-width: 600px) {
  body { padding: 1rem 0.75rem 3rem; }
  header h1 { font-size: 1.4rem; }
  .section-heading h2 { font-size: 1.1rem; }
  .card { padding: 1rem 1.1rem; }
  .stats { gap: 0.6rem; }
  .stat { min-width: 100px; padding: 0.75rem; }
  .stat .num { font-size: 1.3rem; }
}

body::after {
  content: '';
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.5'/%3E%3C/svg%3E");
}
  </style>
</head>
<body>

<div class="container">

  <header>
    <h1>Claude Docs Changelog</h1>
    <div class="date">March 31, 2026</div>
    <span class="badge">Up to date &mdash; synced Mar 31 at 12:01 UTC</span>
  </header>

  <div class="stats">
  </div>





  <footer>
    Generated from <a href="https://github.com/costiash/claude-code-docs" target="_blank" rel="noopener" style="color: var(--blue); text-decoration: none;">claude-code-docs</a> &middot; 0 docs analyzed &middot; 2026-03-31
  </footer>

</div>

<script>
function copyCourseCmd(btn) {
  var topic = btn.dataset.topic;
  var cmd = '/docs --course ' + topic;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(cmd).then(function() { showToast('Copied! Paste in Claude Code: ' + cmd); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = cmd; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied! Paste in Claude Code: ' + cmd);
  }
}
function showToast(msg) {
  var toast = document.getElementById('toast');
  if (!toast) { toast = document.createElement('div'); toast.id = 'toast'; toast.className = 'toast'; document.body.appendChild(toast); }
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(function() { toast.classList.remove('show'); }, 3000);
}
</script>
</body>
</html>
